<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=WDXL+Lubrifont+JP+N&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id= "irot_logo">
      <object data="./logo.svg"></object>
      <span id="logo_text">色相を回転させるカメラ</span>
    </div>
    <div id="videoPreview">
      <video id="video" autoplay muted playsinline></video>
    </div>
    <div id="resultDisplay">
    </div>
    <div id="angle_board">
      <div id ="angle_display">
        <p id="angle_title">回転角</p>
        <p id ="angle_value"></p>
      </div>
      <div  id = "angle_selector">
        <input type="range" id="angle_input" min="0" max="360" />
      </div>
    </div>
    
<script src="./main.js"></script>

  </body>
</html>
